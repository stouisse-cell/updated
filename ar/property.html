<link rel="stylesheet" href="../shared.css">
<style>
  body { font-family: 'Noto Naskh Arabic', 'Didact Gothic', sans-serif; }
  .pd-wrap { padding: 8rem 5% 4rem; max-width: 1280px; margin: 0 auto; }
  .pd-loading, .pd-error { padding: 2rem 0; color: rgba(0,0,0,.6); }
  .pd-back { font-size: .9rem; color: var(--copper); text-decoration: none; }
  .pd-header { margin: 1.4rem 0 2rem; }
  .pd-city { font-size: .85rem; color: var(--copper); margin-bottom: 0.6rem; }
  .pd-title { font-family: 'Cormorant Garamond', 'Noto Naskh Arabic', serif; font-weight: 400; font-size: clamp(2rem, 4.5vw, 3.6rem); line-height: 1.3; color: var(--ink); }
  .pd-subhead { display: flex; gap: 2rem; align-items: baseline; margin-top: 1rem; flex-wrap: wrap; }
  .pd-price { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--ink); }
  .pd-price small { font-size: .55em; opacity: .55; margin-right: .35rem; }
  .pd-status { padding: .35rem .8rem; background: var(--copper); color: #fff; font-size: .8rem; }
  .pd-status.featured { background: var(--gold); color: var(--ink); }
  .pd-gallery { display: grid; grid-template-columns: 2fr 1fr; gap: 0.6rem; height: 540px; margin-bottom: 2.5rem; background: #f1ece2; }
  .pd-gallery .pd-main { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
  .pd-gallery .pd-side { display: grid; grid-template-rows: repeat(2, 1fr); gap: 0.6rem; }
  .pd-gallery .pd-side img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
  @media (max-width: 720px) { .pd-gallery { grid-template-columns: 1fr; height: auto; } .pd-gallery .pd-side { display: none; } .pd-gallery .pd-main { aspect-ratio: 4 / 3; } }
  .pd-thumbs { display: flex; gap: .5rem; overflow-x: auto; margin-bottom: 2.5rem; }
  .pd-thumbs img { width: 110px; height: 80px; object-fit: cover; cursor: pointer; opacity: .7; }
  .pd-thumbs img.active, .pd-thumbs img:hover { opacity: 1; }
  .pd-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; }
  @media (max-width: 920px) { .pd-grid { grid-template-columns: 1fr; } }
  .pd-specs { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1.6rem; padding: 1.6rem 0; border-top: 1px solid rgba(0,0,0,.08); border-bottom: 1px solid rgba(0,0,0,.08); margin-bottom: 2rem; }
  .pd-spec { text-align: center; }
  .pd-spec .v { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--ink); }
  .pd-spec .l { font-size: .82rem; color: rgba(0,0,0,.6); margin-top: .3rem; }
  .pd-section h2 { font-family: 'Cormorant Garamond', 'Noto Naskh Arabic', serif; font-weight: 500; font-size: 1.6rem; color: var(--ink); margin-bottom: 1rem; }
  .pd-desc { line-height: 2; color: rgba(0,0,0,.78); white-space: pre-wrap; margin-bottom: 2rem; font-weight: 300; }
  .pd-features { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: .6rem 1.6rem; margin-bottom: 2rem; }
  .pd-features li { padding-right: 1.4rem; position: relative; font-size: .95rem; color: var(--ink); }
  .pd-features li::before { content: '◆'; position: absolute; right: 0; color: var(--copper); font-size: .7rem; top: .35em; }
  .pd-aside { background: #f6f3ee; padding: 2rem 1.8rem; border: 1px solid rgba(0,0,0,.06); position: sticky; top: 6rem; align-self: start; }
  .pd-aside h3 { font-family: 'Cormorant Garamond', 'Noto Naskh Arabic', serif; font-weight: 500; font-size: 1.4rem; margin-bottom: 0.4rem; color: var(--ink); }
  .pd-aside p { font-size: .9rem; line-height: 1.9; color: rgba(0,0,0,.7); margin-bottom: 1.4rem; }
  .pd-aside .form-input, .pd-aside .form-textarea { background: #fff; }
  .lightbox { position: fixed; inset: 0; background: rgba(7,17,31,.96); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 2rem; }
  .lightbox.is-open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; object-fit: contain; }
  .lightbox button { position: absolute; top: 1rem; left: 1rem; background: transparent; color: #fff; border: 1px solid #fff; padding: .5rem 1rem; cursor: pointer; font-size: .9rem; }
</style>
